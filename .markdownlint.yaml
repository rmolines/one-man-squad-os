# markdownlint configuration
# See: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

default: true

# Allow inline HTML (useful for details/summary, badges)
MD033: false

# Allow duplicate headings (common in HANDOVER.md entries)
MD024: false

# Allow long lines (URLs, tables)
MD013:
  line_length: 200
  tables: false
  code_blocks: false

# Allow trailing punctuation in headings (e.g., "TODO:")
MD026: false

# Allow bare URLs in some contexts
MD034: false

# Allow first heading to not be h1 (useful in templates)
MD041: false

# Allow table column style variation (cosmetic, too noisy for templates)
MD060: false

# Allow fenced code blocks without blank lines (too noisy inside list items)
MD031: false

# Allow lists without surrounding blank lines (too noisy in dense docs)
MD032: false
