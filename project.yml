name: OneManSquadOS

options:
  bundleIdPrefix: com.rmolines
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"

packages:
  SettingsAccess:
    url: https://github.com/orchetect/SettingsAccess
    from: 2.0.0
  Core:
    path: .

targets:
  OneManSquadOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/OneManSquadOS
    dependencies:
      - package: SettingsAccess
        product: SettingsAccess
      - package: Core
        product: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rmolines.one-man-squad-os
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/OneManSquadOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
