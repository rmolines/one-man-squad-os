name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build (Core + App)
        run: swift build -c release 2>&1 | xcbeautify || swift build -c release

      - name: Test (CoreTests)
        run: swift test --filter CoreTests 2>&1 | xcbeautify || swift test --filter CoreTests
